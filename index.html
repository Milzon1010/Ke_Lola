<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ke_Lola — Prototype Aplikasi</title>
<style>
  :root{
    --ink:#1a2b4a; --ink-2:#2a3f63;
    --paper:#f5f6f9; --card:#ffffff; --line:#e6e9f0;
    --muted:#6b7794; --brand:#1f3a6e; --brand-soft:#eaf0fb;
    --accent:#e8923a;
    --green:#2f9e6b; --green-soft:#e4f3ec;
    --amber:#c9892a; --amber-soft:#fbf2df;
    --red:#cf4d4d; --red-soft:#fbe9e9;
    --blue-soft:#e6eefb; --purple:#7a5cc9; --purple-soft:#efeafb;
    --radius:14px; --shadow:0 1px 2px rgba(26,43,74,.06), 0 8px 24px rgba(26,43,74,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit}
  .topbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.3px}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#f0a85a);display:grid;place-items:center;font-size:16px}
  .switch{display:flex;background:rgba(255,255,255,.12);border-radius:999px;padding:4px;gap:4px}
  .switch button{border:0;background:transparent;color:rgba(255,255,255,.7);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
  .switch button.active{background:#fff;color:var(--ink)}
  .mode{display:none}.mode.show{display:block}
  .corp{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 54px)}
  .side{background:var(--ink);color:#cdd5e6;padding:20px 14px}
  .side .ctx{background:rgba(255,255,255,.06);border-radius:10px;padding:12px;margin-bottom:18px}
  .side .ctx .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#8c99b8}
  .side .ctx select{width:100%;margin-top:6px;background:transparent;border:0;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  .side .ctx select option{color:#000}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:#aeb9d2;text-decoration:none;font-size:14px;margin-bottom:2px;cursor:pointer;transition:.12s}
  .nav a.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
  .nav a:hover{background:rgba(255,255,255,.06)}
  .nav .ic{width:18px;text-align:center}
  .main{padding:24px 28px;overflow:auto}
  .page{display:none}.page.show{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .page-head h1{font-size:22px;font-weight:700}
  .page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .range{display:flex;gap:6px}
  .range button,.btn{border:1px solid var(--line);background:#fff;color:var(--muted);padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
  .range button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);padding:9px 16px;font-size:13px}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-ghost:hover{background:var(--paper)}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .ic{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:16px}
  .kpi .lbl{color:var(--muted);font-size:12px;font-weight:600;margin-top:12px}
  .kpi .val{font-size:26px;font-weight:700;margin-top:2px;letter-spacing:-.5px}
  .kpi .delta{font-size:12px;font-weight:600;margin-top:4px}
  .delta.up{color:var(--green)}.delta.down{color:var(--red)}
  .grid2{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;margin-bottom:18px}
  .grid1{margin-bottom:18px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);gap:10px;flex-wrap:wrap}
  .panel-head h2{font-size:15px;font-weight:700}
  .panel-head .hint{font-size:12px;color:var(--muted)}
  .panel-body{padding:18px}
  .panel-body.flush{padding:0}
  .chart{display:flex;align-items:flex-end;gap:14px;height:190px;padding-top:10px}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
  .bar{width:100%;max-width:42px;border-radius:7px 7px 0 0;background:var(--blue-soft);position:relative;transition:.25s;cursor:pointer}
  .bar.peak{background:var(--brand)}.bar:hover{filter:brightness(.95)}
  .bar .tip{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s}
  .bar:hover .tip{opacity:1}
  .bar-lbl{font-size:11px;color:var(--muted)}
  .row{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid var(--line)}
  .row:last-child{border-bottom:0}
  .avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
  .pill{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .nm{font-size:13px;font-weight:600}.sub2{font-size:11px;color:var(--muted);margin-top:1px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:12px 18px;border-bottom:1px solid var(--line);font-weight:700;background:#fafbfd}
  thead th.num{text-align:right}
  tbody td{padding:13px 18px;border-bottom:1px solid var(--line)}
  tbody tr:last-child td{border-bottom:0}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#fafbfd}
  td .ttl{font-weight:600}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .input{border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--ink);background:#fff;outline:none}
  .input:focus{border-color:var(--brand)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:8px 13px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.active{background:var(--brand);color:#fff}
  .stock-bar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;max-width:120px}
  .stock-bar i{display:block;height:100%;border-radius:99px}
  .board{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:18px;overflow-x:auto}
  .col{background:#fafbfd;border:1px solid var(--line);border-radius:12px;padding:10px;min-width:170px}
  .col h3{font-size:12px;font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .col .count{background:var(--line);border-radius:99px;padding:1px 8px;font-size:11px;color:var(--muted)}
  .ticket{background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 2px rgba(26,43,74,.04)}
  .ticket:hover{border-color:var(--brand)}
  .ticket .tno{font-size:11px;font-weight:700;color:var(--brand)}
  .ticket .tdesc{font-size:12.5px;font-weight:600;margin-top:3px}
  .ticket .tmeta{font-size:11px;color:var(--muted);margin-top:4px}
  .overlay{position:fixed;inset:0;background:rgba(20,30,55,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:560px;max-width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2}
  .modal-head h2{font-size:17px}
  .modal-body{padding:22px}
  .x{cursor:pointer;font-size:22px;color:var(--muted);line-height:1;border:0;background:none}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--line);position:sticky;bottom:0;background:#fff}
  .check{display:flex;align-items:center;gap:11px;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.12s}
  .check:hover{border-color:var(--brand)}
  .check.done{background:var(--green-soft);border-color:var(--green)}
  .check .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);display:grid;place-items:center;flex-shrink:0;font-size:13px;color:#fff}
  .check.done .box{background:var(--green);border-color:var(--green)}
  .check .txt{font-size:13px;font-weight:500}
  .check.done .txt{text-decoration:line-through;color:var(--muted)}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .stepper button{border:0;background:#fafbfd;width:30px;height:32px;font-size:16px;cursor:pointer;color:var(--brand)}
  .stepper button:hover{background:var(--brand-soft)}
  .stepper span{width:40px;text-align:center;font-size:13px;font-weight:700}
  .total-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;background:var(--ink);color:#fff;border-radius:12px;margin-top:14px}
  .total-bar .lbl{font-size:13px;color:#aeb9d2}
  .total-bar .amt{font-size:22px;font-weight:700}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:200;opacity:0;transition:.3s}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .big{font-size:34px;margin-bottom:8px}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);padding:0 18px}
  .tabs button{border:0;background:none;padding:13px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
  .cust-wrap{display:grid;place-items:start center;padding:30px 16px}
  .phone{width:390px;max-width:100%;background:var(--card);border:1px solid var(--line);border-radius:30px;box-shadow:0 20px 60px rgba(26,43,74,.16);overflow:hidden}
  .ph-screen{display:none}.ph-screen.show{display:block}
  .ph-head{background:var(--ink);color:#fff;padding:22px 20px 26px}
  .ph-head .hi{font-size:13px;color:#aeb9d2}
  .ph-head h2{font-size:22px;font-weight:700;margin-top:2px}
  .ph-back{background:none;border:0;color:#aeb9d2;font-size:13px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:5px}
  .search{margin-top:16px;background:rgba(255,255,255,.13);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:10px;color:#aeb9d2;font-size:13px}
  .chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:600;padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.1);color:#cdd5e6;cursor:pointer}
  .chip.on{background:#fff;color:var(--ink)}
  .ph-body{padding:18px}
  .sec-lbl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:2px 0 12px}
  .shop{display:flex;gap:13px;padding:13px;border:1px solid var(--line);border-radius:13px;margin-bottom:11px;cursor:pointer;transition:.15s}
  .shop:hover{border-color:var(--brand);box-shadow:var(--shadow)}
  .shop.sel{border-color:var(--brand);background:var(--brand-soft)}
  .shop .thumb{width:54px;height:54px;border-radius:11px;display:grid;place-items:center;font-size:22px;flex-shrink:0}
  .shop .nm{font-size:14px;font-weight:700}
  .shop .det{font-size:11.5px;color:var(--muted);margin-top:2px}
  .shop .tags{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
  .tag.star{background:var(--amber-soft);color:var(--amber)}
  .tag.open{background:var(--green-soft);color:var(--green)}
  .tag.b2b{background:var(--blue-soft);color:var(--brand)}
  .svc-opt{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer}
  .svc-opt:hover{border-color:var(--brand)}
  .svc-opt.sel{border-color:var(--brand);background:var(--brand-soft)}
  .svc-opt .r{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0}
  .svc-opt.sel .r{border-color:var(--brand);background:var(--brand);box-shadow:inset 0 0 0 3px #fff}
  .svc-opt .price{margin-left:auto;font-weight:700;font-size:14px}
  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px}
  .slot{text-align:center;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .slot:hover{border-color:var(--brand)}
  .slot.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
  .day-pick{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .day{min-width:64px;text-align:center;padding:10px;border:1px solid var(--line);border-radius:10px;cursor:pointer;flex-shrink:0}
  .day.sel{background:var(--brand);color:#fff;border-color:var(--brand)}
  .day .dd{font-size:18px;font-weight:700}
  .day .dm{font-size:11px;opacity:.7}
  .summary-line{display:flex;justify-content:space-between;font-size:14px;padding:9px 0;border-bottom:1px solid var(--line)}
  .summary-line:last-child{border:0;font-weight:700;font-size:16px;padding-top:13px}
  .ph-cta{margin:8px 18px 18px;padding:15px;text-align:center;background:var(--brand);color:#fff;border-radius:13px;font-weight:700;font-size:15px;cursor:pointer;border:0;width:calc(100% - 36px)}
  .ph-cta:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}
  .tabbar{display:flex;justify-content:space-around;padding:14px 0 18px;border-top:1px solid var(--line)}
  .tabbar div{font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .tabbar div.on{color:var(--brand);font-weight:700}
  .tabbar .ti{font-size:18px}
  .success-anim{text-align:center;padding:40px 24px}
  .success-anim .circle{width:80px;height:80px;border-radius:50%;background:var(--green-soft);color:var(--green);font-size:42px;display:grid;place-items:center;margin:0 auto 18px;animation:pop .4s ease}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
  @media(max-width:900px){
    .corp{grid-template-columns:1fr}.side{display:none}
    .kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}
    .board{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">🔧</span> Ke_Lola</div>
  <div class="switch">
    <button id="btnCorp" class="active" onclick="setMode('corp')">Korporat · Manajemen</button>
    <button id="btnCust" onclick="setMode('cust')">Pelanggan · Marketplace</button>
  </div>
</div>
<div id="corp" class="mode show">
<div class="corp">
  <aside class="side">
    <div class="ctx">
      <div class="lbl">Cabang</div>
      <select onchange="return false">
        <option>Jakarta Pusat</option><option>Bekasi (Cabang)</option>
        <option>Bengkel Jaya — Partner</option><option>Semua Cabang (Agregat)</option>
      </select>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>
</div>
<div id="cust" class="mode"><div class="cust-wrap"><div class="phone" id="phone"></div></div></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>

  ],
  invoices:[
    {no:'INV-2026-1182',wo:'WO-2026-0478',plat:'B 3456 IJ',cust:'Bpk. Hartono',total:1387500,status:'Lunas',metode:'QRIS'},

function saveInvoice(){
  const wno=document.getElementById('iv_wo').value;const w=DATA.workOrders.find(x=>x.no===wno);
  const disc=+document.getElementById('iv_disc').value||0;
  const total=Math.round((w.estimasi-disc)*1.11);

  DATA.invoices.unshift({no,wo:wno,plat:w.plat,cust:'Pelanggan',total,status:'Piutang',metode:'—'});
  closeModal();toast(`${no} dibuat`);go('kasir');
}

        <div class="summary-line"><span>Estimasi</span><span>${rp(booking.service.harga)}</span></div>
      </div>
      <div class="sub2" style="margin-top:14px">Pembayaran dilakukan di bengkel setelah layanan selesai (tunai / transfer / QRIS).</div>
    </div>
    <button class="ph-cta" onclick="scrDone()">Konfirmasi Booking</button></div>`;
}
function scrDone(){
  const p=document.getElementById('phone');
  p.innerHTML=`<div class="ph-screen show">
    <div class="success-anim"><div class="circle">✓</div><h2 style="font-size:20px">Booking Berhasil!</h2>
    <div class="sub2" style="margin-top:8px;font-size:13px">Kode booking <b>BK-2026-0488</b><br>${booking.shop.nm} · ${booking.day.dd} ${booking.day.dm}, ${booking.slot}</div></div>
    <div class="ph-body"><div class="sec-lbl">Selanjutnya</div>
      <div class="row" style="border:1px solid var(--line);border-radius:11px;margin-bottom:8px"><div class="avatar" style="background:var(--brand)">1</div><div><div class="nm">Datang sesuai jadwal</div><div class="sub2">Tunjukkan kode booking ke service advisor</div></div></div>
      <div class="row" style="border:1px solid var(--line);border-radius:11px"><div class="avatar" style="background:var(--accent)">2</div><div><div class="nm">Pantau status servis</div><div class="sub2">Notifikasi saat WO masuk QC & selesai</div></div></div>
    </div>
    <button class="ph-cta" onclick="renderPhone()">Kembali ke Beranda</button></div>`;
  toast('Booking BK-2026-0488 dibuat');
}

/* ===== INIT ===== */
renderNav();go('dashboard');renderPhone();

</script>
